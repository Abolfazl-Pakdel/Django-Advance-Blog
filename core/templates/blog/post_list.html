<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>blog posts</h1>
    <ol>
        {% for post in posts %}
            <li>
                <div>
                    <a href="{% url 'blog:post-detail' pk=post.id %}"><h2>{{ post.id }} - {{ post.title }}</h2></a>
                    <a href="{% url 'blog:post-edit' pk=post.id %}">
                        <h5>Edit</h5>
                    </a>
                    <a href="{% url 'blog:post-delete' pk=post.id %}">
                        <h5>Delete</h5>
                    </a>
                    <small>{{ post.author }} - {{ post.published_date }}</small>
                </div>
            </li>
        {% endfor %}
    </ol>
</body>
</html>
